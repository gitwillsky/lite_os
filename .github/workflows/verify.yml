name: verify

on:
  pull_request:
  push:
    branches: [main, std]

permissions:
  contents: read

jobs:
  architecture-and-boot:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes e2fsprogs gcc-riscv64-linux-gnu llvm qemu-system-misc
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install nightly-2025-06-15 --profile minimal --component rustfmt
          rustup target add riscv64gc-unknown-none-elf --toolchain nightly-2025-06-15
      - name: Verify architecture, artifacts, and cold boots
        run: make verify

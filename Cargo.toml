[workspace]
members = [
    "kernel",
    "syscall-abi",
    "tools/architecture-check",
    "tools/kernel-unit",
    "tools/scheduler-unit",
]
exclude = ["bootloader", "user/display-client", "user/display-session", "user/liteui-compositor", "user/liteui-core", "user/liteui-host", "user/liteui-session", "user/service-activation", "user/terminal-service"]
default-members = ["kernel"]
resolver = "3"

[profile.release]
panic = "abort"
opt-level = "s"
lto = "fat"

[profile.dev]
panic = "abort"
opt-level = "s"
debug-assertions = true
